<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 5 Hindi Vocabulary Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a2e;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 600px;
            height: 500px;
            background: linear-gradient(to bottom, #111d4a, #080d24);
            border: 4px solid #4f46e5;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #ui-bar {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.4);
            font-size: 18px;
            font-weight: bold;
            border-bottom: 2px solid #4f46e5;
        }
        #target-word-box {
            text-align: center;
            margin-top: 20px;
        }
        #find-text {
            font-size: 14px;
            color: #a5b4fc;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #target-word {
            font-size: 36px;
            font-weight: 800;
            color: #f59e0b;
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
        }
        .balloon {
            position: absolute;
            width: 90px;
            height: 110px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: inset -8px -8px 0px rgba(0,0,0,0.15), 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
            user-select: none;
        }
        .balloon:after {
            content: "";
            position: absolute;
            bottom: -8px;
            left: 41px;
            width: 0;
            height: 0;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-bottom: 8px solid;
        }
        .b-0 { background: #ef4444; } .b-0:after { border-bottom-color: #ef4444; }
        .b-1 { background: #3b82f6; } .b-1:after { border-bottom-color: #3b82f6; }
        .b-2 { background: #10b981; } .b-2:after { border-bottom-color: #10b981; }
        .b-3 { background: #8b5cf6; } .b-3:after { border-bottom-color: #8b5cf6; }

        #screen-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .btn {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.4);
        }
        .btn:hover { background: #4338ca; }
        h1 { margin: 0 0 10px 0; font-size: 32px; text-align: center;}
        p { margin: 5px 0; color: #cbd5e1; font-size: 16px;}
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-bar">
            <div>SCORE: <span id="score-val">0</span></div>
            <div>LIVES: <span id="lives-val">❤️❤️❤️</span></div>
        </div>

        <div id="target-word-box">
            <div id="find-text">Find the Hindi word for:</div>
            <div id="target-word">LOADING...</div>
        </div>

        <div id="play-area"></div>

        <div id="screen-overlay">
            <h1 id="overlay-title">Hindi Vocabulary Burst!</h1>
            <p id="overlay-desc">Pop the correct Hindi word balloon matching the English word.</p>
            <button class="btn" id="action-btn">START GAME</button>
        </div>
    </div>

<script>
(function() {
    // Dataset tailored for Class 5 Vocabulary levels
    const dataset = [
        { english: "Water", correct: "पानी", wrongs: ["आग", "हवा"] },
        { english: "Sky", correct: "आकाश", wrongs: ["धरती", "पाताल"] },
        { english: "Friend", correct: "मित्र", wrongs: ["शत्रु", "अजनबी"] },
        { english: "Book", correct: "किताब", wrongs: ["कलम", "कागज"] },
        { english: "Sun", correct: "सूरज", wrongs: ["चाँद", "तारे"] },
        { english: "Tree", correct: "पेड़", wrongs: ["पौधा", "फल"] },
        { english: "Night", correct: "रात", wrongs: ["दिन", "सुबह"] },
        { english: "King", correct: "राजा", wrongs: ["प्रजा", "सैनिक"] },
        { english: "House", correct: "घर", wrongs: ["दुकान", "बाज़ार"] },
        { english: "Beautiful", correct: "सुंदर", wrongs: ["कुरूप", "साफ़"] }
    ];

    let currentQuestion = {};
    let score = 0;
    let lives = 3;
    let balloons = [];
    let spawnTimer = null;
    let loopTimer = null;
    let isPlaying = false;

    const playArea = document.getElementById('play-area');
    const targetWordEl = document.getElementById('target-word');
    const scoreEl = document.getElementById('score-val');
    const livesEl = document.getElementById('lives-val');
    const overlay = document.getElementById('screen-overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayDesc = document.getElementById('overlay-desc');
    const actionBtn = document.getElementById('action-btn');

    // Safe Event Listener Binding inside the closure scope
    actionBtn.addEventListener('click', startGame);

    function startGame() {
        score = 0;
        lives = 3;
        balloons.forEach(b => b.el.remove());
        balloons = [];
        scoreEl.innerText = score;
        livesEl.innerText = "❤️❤️❤️";
        overlay.style.display = 'none';
        isPlaying = true;
        
        nextQuestion();
        
        if(spawnTimer) clearInterval(spawnTimer);
        if(loopTimer) clearInterval(loopTimer);
        
        spawnTimer = setInterval(spawnBalloonGroup, 3500);
        loopTimer = setInterval(gameUpdate, 1000 / 60); // Clean 60 FPS update loop
        spawnBalloonGroup();
    }

    function nextQuestion() {
        const randomIndex = Math.floor(Math.random() * dataset.length);
        currentQuestion = dataset[randomIndex];
        targetWordEl.innerText = currentQuestion.english;
    }

    function spawnBalloonGroup() {
        if (!isPlaying) return;
        
        const options = [
            { text: currentQuestion.correct, isCorrect: true },
            { text: currentQuestion.wrongs[0], isCorrect: false },
            { text: currentQuestion.wrongs[1], isCorrect: false }
        ];
        
        // Shuffle the array elements randomly
        options.sort(() => Math.random() - 0.5);
        
        // Separate lanes to avoid messy asset overlap stacked look
        const lanes = [40, 240, 440];
        lanes.sort(() => Math.random() - 0.5);

        options.forEach((opt, index) => {
            const el = document.createElement('div');
            el.className = `balloon b-${Math.floor(Math.random() * 4)}`;
            el.innerText = opt.text;
            el.style.left = `${lanes[index]}px`;
            el.style.top = '520px'; // Render below window bounds initially
            
            el.addEventListener('mousedown', () => handleBalloonClick(opt, el));
            playArea.appendChild(el);
            
            balloons.push({
                el: el,
                y: 520,
                speed: 1 + Math.random() * 1, // Randomized speed to mix it up
                isCorrect: opt.isCorrect
            });
        });
    }

    function handleBalloonClick(option, element) {
        if(!isPlaying) return;
        
        // Pop Action Visual Scaling
        element.style.transform = 'scale(1.3)';
        setTimeout(() => element.remove(), 80);

        balloons = balloons.filter(b => b.el !== element);

        if (option.isCorrect) {
            score += 10;
            scoreEl.innerText = score;
            nextQuestion();
            // Visually fade remaining incorrect options
            balloons.forEach(b => {
                if(!b.isCorrect) {
                    b.el.style.opacity = '0.5';
                }
            });
        } else {
            loseLife();
        }
    }

    function loseLife() {
        lives--;
        livesEl.innerText = "❤️".repeat(lives);
        if (lives <= 0) {
            endGame();
        }
    }

    function gameUpdate() {
        if (!isPlaying) return;

        for (let i = balloons.length - 1; i >= 0; i--) {
            let b = balloons[i];
            b.y -= b.speed;
            b.el.style.top = `${b.y}px`;

            // If a correct answer reaches the top ceiling untouched, change word & lose a life
            if (b.y < 60) {
                b.el.remove();
                balloons.splice(i, 1);
                if (b.isCorrect) {
                    loseLife();
                    nextQuestion();
                }
            }
        }
    }

    function endGame() {
        isPlaying = false;
        clearInterval(spawnTimer);
        clearInterval(loopTimer);
        
        overlayTitle.innerText = "Game Over!";
        overlayDesc.innerText = `Great Effort! Final Score: ${score} points.`;
        actionBtn.innerText = "PLAY AGAIN";
        overlay.style.display = 'flex';
    }
})();
</script>
</body>
</html>
