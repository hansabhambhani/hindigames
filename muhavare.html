<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hindi Muhavare Quiz</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1e1e2f;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-card {
            width: 700px;
            background: #2a2a40;
            border: 4px solid #f59e0b;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            overflow: hidden;
            position: relative;
        }
        #top-bar {
            display: flex;
            justify-content: space-between;
            background: #1a1a2e;
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 3px solid #f59e0b;
        }
        #question-container {
            text-align: center;
            padding: 25px;
            background: #333352;
            margin: 20px;
            border-radius: 12px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }
        #muhavara-text {
            font-size: 38px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
        }
        #instruction {
            font-size: 14px;
            color: #cbd5e1;
            letter-spacing: 0.5px;
        }
        #options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 0 20px 20px 20px;
        }
        .option-btn {
            background: #3b3b5c;
            border: 3px solid #4f46e5;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }
        .option-btn:hover {
            background: #43436f;
            border-color: #f59e0b;
            transform: translateY(-2px);
        }
        .canvas-holder {
            background: #fff;
            border-radius: 8px;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            flex-shrink: 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .meaning-text {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            line-height: 1.3;
        }
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .btn {
            background: #f59e0b;
            color: #1a1a2e;
            border: none;
            padding: 14px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 14px rgba(245, 158, 11, 0.4);
            transition: transform 0.1s;
        }
        .btn:hover { transform: scale(1.05); }
        h1 { margin: 0 0 10px 0; font-size: 36px; color: #f59e0b; text-align: center; }
        p { margin: 5px 0; color: #cbd5e1; font-size: 18px; text-align: center; }
    </style>
</head>
<body>

    <div id="game-card">
        <div id="top-bar">
            <div>SCORE: <span id="score-box">0</span></div>
            <div>LIVES: <span id="lives-box">❤️❤️❤️</span></div>
        </div>

        <div id="question-container">
            <div id="muhavara-text">Loading...</div>
            <div id="instruction">(सही अर्थ वाले चित्र पर क्लिक करें)</div>
        </div>

        <div id="options-grid">
            <div class="option-btn" onclick="checkAnswer(0)"><div class="canvas-holder"><canvas id="canv0" width="80" height="80"></canvas></div><div class="meaning-text" id="text0">...</div></div>
            <div class="option-btn" onclick="checkAnswer(1)"><div class="canvas-holder"><canvas id="canv1" width="80" height="80"></canvas></div><div class="meaning-text" id="text1">...</div></div>
            <div class="option-btn" onclick="checkAnswer(2)"><div class="canvas-holder"><canvas id="canv2" width="80" height="80"></canvas></div><div class="meaning-text" id="text2">...</div></div>
            <div class="option-btn" onclick="checkAnswer(3)"><div class="canvas-holder"><canvas id="canv3" width="80" height="80"></canvas></div><div class="meaning-text" id="text3">...</div></div>
        </div>

        <div id="overlay">
            <h1 id="overlay-title">मुहावरे चित्र पहेली!</h1>
            <p id="overlay-desc">Match the Muhavare with its correct visual meaning picture.</p>
            <button class="btn" id="action-btn" onclick="startGame()">START GAME</button>
        </div>
    </div>

<script>
    const dataset = [
        { idiom: "नौ दो ग्यारह होना", meaning: "भाग जाना / रफूचक्कर होना", drawType: "running" },
        { idiom: "आँखों का तारा", meaning: "बहुत प्यारा होना", drawType: "starEye" },
        { idiom: "पेट में चूहे कूदना", meaning: "बहुत भूख लगना", drawType: "miceStomach" },
        { idiom: "आसमान के तारे तोड़ना", meaning: "असंभव कार्य करना", drawType: "grabStars" }
    ];

    let currentQuestion = {};
    let score = 0;
    let lives = 3;
    let pool = [];

    const scoreBox = document.getElementById('score-box');
    const livesBox = document.getElementById('lives-box');
    const muhavaraText = document.getElementById('muhavara-text');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayDesc = document.getElementById('overlay-desc');
    const actionBtn = document.getElementById('action-btn');

    function startGame() {
        score = 0;
        lives = 3;
        scoreBox.innerText = score;
        livesBox.innerText = "❤️❤️❤️";
        overlay.style.display = 'none';
        nextRound();
    }

    function nextRound() {
        // Pick random question
        const randIdx = Math.floor(Math.random() * dataset.length);
        currentQuestion = dataset[randIdx];
        muhavaraText.innerText = currentQuestion.idiom;

        // Shuffle options
        pool = [...dataset];
        pool.sort(() => Math.random() - 0.5);

        // Update texts and draw directly on canvases
        for(let i = 0; i < 4; i++) {
            document.getElementById(`text${i}`).innerText = pool[i].meaning;
            const canvas = document.getElementById(`canv${i}`);
            drawVectorGraphic(canvas, pool[i].drawType);
        }
    }

    function checkAnswer(selectedIndex) {
        let selectedItem = pool[selectedIndex];
        
        if (selectedItem.idiom === currentQuestion.idiom) {
            score += 100;
            scoreBox.innerText = score;
            nextRound();
        } else {
            lives--;
            livesBox.innerText = "❤️".repeat(lives);
            if (lives <= 0) {
                endGame();
            } else {
                nextRound();
            }
        }
    }

    function endGame() {
        overlay.style.display = 'flex';
        overlayTitle.innerText = "खेल समाप्त! (Game Over)";
        overlayDesc.innerText = `आपका कुल स्कोर: ${score} अंक`;
        actionBtn.innerText = "फिर से खेलें";
    }

    function drawVectorGraphic(canvas, type) {
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();

        if (type === "running") {
            ctx.strokeStyle = "#1e1e2f"; ctx.lineWidth = 4; ctx.lineCap = "round";
            ctx.beginPath(); ctx.arc(40, 22, 7, 0, Math.PI*2); ctx.stroke(); 
            ctx.beginPath(); ctx.moveTo(40, 29); ctx.lineTo(42, 48); ctx.stroke(); 
            ctx.beginPath(); ctx.moveTo(42, 48); ctx.lineTo(28, 65); ctx.moveTo(42, 48); ctx.lineTo(58, 62); ctx.stroke(); 
            ctx.beginPath(); ctx.moveTo(40, 35); ctx.lineTo(22, 42); ctx.moveTo(40, 35); ctx.lineTo(55, 38); ctx.stroke(); 
            ctx.fillStyle = "#e11d48"; ctx.font = "bold 16px Arial"; ctx.fillText("9", 10, 25);
            ctx.fillStyle = "#2563eb"; ctx.font = "bold 16px Arial"; ctx.fillText("2", 64, 28);
            ctx.fillStyle = "#16a34a"; ctx.font = "bold 14px Arial"; ctx.fillText("=11", 42, 74);

        } else if (type === "starEye") {
            ctx.fillStyle = "#e2e8f0"; ctx.strokeStyle = "#1e1e2f"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.ellipse(40, 40, 32, 18, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = "#3b82f6";
            ctx.beginPath(); ctx.arc(40, 40, 13, 0, Math.PI*2); ctx.fill();
            drawStar(ctx, 40, 40, 5, 9, 4, "#f59e0b");

        } else if (type === "miceStomach") {
            ctx.fillStyle = "#fed7aa"; ctx.strokeStyle = "#9a3412"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.ellipse(40, 40, 25, 32, Math.PI/4, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = "#6b7280";
            ctx.beginPath(); ctx.ellipse(42, 38, 12, 7, 0, 0, Math.PI*2); ctx.fill(); 
            ctx.beginPath(); ctx.arc(50, 32, 4, 0, Math.PI*2); ctx.fill(); 
            ctx.strokeStyle = "#374151"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(30, 38); ctx.quadraticCurveTo(20, 42, 24, 46); ctx.stroke(); 

        } else if (type === "grabStars") {
            ctx.fillStyle = "#0f172a"; ctx.fillRect(4, 4, 72, 72);
            drawStar(ctx, 20, 20, 5, 6, 2.5, "#fcc013");
            drawStar(ctx, 60, 24, 5, 7, 3, "#fcc013");
            drawStar(ctx, 42, 14, 5, 5, 2, "#fcc013");
            ctx.strokeStyle = "#ffedd5"; ctx.fillStyle = "#fed7aa"; ctx.lineWidth = 4; ctx.lineJoin = "round";
            ctx.beginPath(); ctx.moveTo(32, 80); ctx.lineTo(34, 52); ctx.lineTo(44, 52); ctx.lineTo(46, 80); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.arc(39, 50, 5, 0, Math.PI, true); ctx.stroke();
        }
        ctx.restore();
    }

    function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius, color) {
        let rot = Math.PI / 2 * 3; let x = cx; let y = cy; let step = Math.PI / spikes;
        ctx.beginPath(); ctx.moveTo(cx, cy - outerRadius);
        for (let i = 0; i < spikes; i++) {
            x = cx + Math.cos(rot) * outerRadius; y = cy + Math.sin(rot) * outerRadius; ctx.lineTo(x, y); rot += step;
            x = cx + Math.cos(rot) * innerRadius; y = cy + Math.sin(rot) * innerRadius; ctx.lineTo(x, y); rot += step;
        }
        ctx.lineTo(cx, cy - outerRadius); ctx.closePath(); ctx.fillStyle = color; ctx.fill();
    }
</script>
</body>
</html>
