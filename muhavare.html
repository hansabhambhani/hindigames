<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hindi Muhavare Quiz</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1e1e2f;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-card {
            width: 700px;
            background: #2a2a40;
            border: 4px solid #f59e0b;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            overflow: hidden;
            position: relative;
        }
        #top-bar {
            display: flex;
            justify-content: space-between;
            background: #1a1a2e;
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 3px solid #f59e0b;
        }
        #question-container {
            text-align: center;
            padding: 25px;
            background: #333352;
            margin: 20px;
            border-radius: 12px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }
        #muhavara-text {
            font-size: 38px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
        }
        #instruction {
            font-size: 14px;
            color: #cbd5e1;
            letter-spacing: 0.5px;
        }
        #options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 0 20px 20px 20px;
        }
        .option-btn {
            background: #3b3b5c;
            border: 3px solid #4f46e5;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }
        .option-btn:hover {
            background: #43436f;
            border-color: #f59e0b;
            transform: translateY(-2px);
        }
        .canvas-holder {
            background: #fff;
            border-radius: 8px;
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            flex-shrink: 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .meaning-text {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            line-height: 1.3;
        }
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .btn {
            background: #f59e0b;
            color: #1a1a2e;
            border: none;
            padding: 14px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 14px rgba(245, 158, 11, 0.4);
            transition: transform 0.1s;
        }
        .btn:hover { transform: scale(1.05); }
        h1 { margin: 0 0 10px 0; font-size: 36px; color: #f59e0b; }
        p { margin: 5px 0; color: #cbd5e1; font-size: 18px; }
    </style>
</head>
<body>

    <div id="game-card">
        <div id="top-bar">
            <div>SCORE: <span id="score-box">0</span></div>
            <div>LIVES: <span id="lives-box">❤️❤️❤️</span></div>
        </div>

        <div id="question-container">
            <div id="muhavara-text">Loading...</div>
            <div id="instruction">(सही अर्थ वाले चित्र पर क्लिक करें)</div>
        </div>

        <div id="options-grid">
            <div class="option-btn" id="opt0"><div class="canvas-holder"><canvas id="canv0" width="80" height="80"></canvas></div><div class="meaning-text" id="text0">...</div></div>
            <div class="option-btn" id="opt1"><div class="canvas-holder"><canvas id="canv1" width="80" height="80"></canvas></div><div class="meaning-text" id="text1">...</div></div>
            <div class="option-btn" id="opt2"><div class="canvas-holder"><canvas id="canv2" width="80" height="80"></canvas></div><div class="meaning-text" id="text2">...</div></div>
            <div class="option-btn" id="opt3"><div class="canvas-holder"><canvas id="canv3" width="80" height="80"></canvas></div><div class="meaning-text" id="text3">...</div></div>
        </div>

        <div id="overlay">
            <h1 id="overlay-title">मुहावरे चित्र पहेली!</h1>
            <p id="overlay-desc">Match the Muhavare with its correct visual meaning picture.</p>
            <button class="btn" id="action-btn">START GAME</button>
        </div>
    </div>

<script>
(function() {
    // Game Questions & Vector Graphics Generators Mapping
    const dataset = [
        { 
            idiom: "नौ दो ग्यारह होना", 
            meaning: "भाग जाना / रफूचक्कर होना", 
            drawType: "running" 
        },
        { 
            idiom: "आँखों का तारा", 
            meaning: "बहुत प्यारा होना", 
            drawType: "starEye" 
        },
        { 
            idiom: "पेट में चूहे कूदना", 
            meaning: "बहुत भूख लगना", 
            drawType: "miceStomach" 
        },
        { 
            idiom: "आसमान के तारे तोड़ना", 
            meaning: "असंभव कार्य करना", 
            drawType: "grabStars" 
        }
    ];

    let currentQuestion = {};
    let score = 0;
    let lives = 3;
    let pool = [];

    const scoreBox = document.getElementById('score-box');
    const livesBox = document.getElementById('lives-box');
    const muhavaraText = document.getElementById('muhavara-text');
    const overlay = document.getElementById('screen-overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayDesc = document.getElementById('overlay-desc');
    const actionBtn = document.getElementById('action-btn');

    actionBtn.addEventListener('click', startGame);

    function startGame() {
        score = 0;
        lives = 3;
        scoreBox.innerText = score;
        livesBox.innerText = "❤️❤️❤️";
        document.getElementById('overlay').style.display = 'none';
        nextRound();
    }

    function nextRound() {
        // Pick a random question
        const randIdx = Math.floor(Math.random() * dataset.length);
        currentQuestion = dataset[randIdx];
        muhavaraText.innerText = currentQuestion.idiom;

        // Create options display pool
        pool = [...dataset];
        pool.sort(() => Math.random() - 0.5);

        // Render targets
        for(let i = 0; i < 4; i++) {
            const btn = document.getElementById(`opt${i}`);
            const textNode = document.getElementById(`text${i}`);
            const canvas = document.getElementById(`canv${i}`);
            
            textNode.innerText = pool[i].meaning;
            drawVectorGraphic(canvas, pool[i].drawType);

            // Clean off old listeners securely via cloning elements
            const newBtn = btn.cloneNode(true);
            btn.parentNode.replaceChild(newBtn, btn);

            newBtn.addEventListener('click', () => verifySelection(pool[i]));
        }
    }

    function verifySelection(selectedItem) {
        if (selectedItem.idiom === currentQuestion.idiom) {
            score += 100;
            scoreBox.innerText = score;
            nextRound();
        } else {
            lives--;
            livesBox.innerText = "❤️".repeat(lives);
            if (lives <= 0) {
                endGame();
            } else {
                nextRound();
            }
        }
    }

    function endGame() {
        document.getElementById('overlay').style.display = 'flex';
        overlayTitle.innerText = "खेल समाप्त! (Game Over)";
        overlayDesc.innerText = `आपका कुल स्कोर: ${score} अंक`;
        actionBtn.innerText = "फिर से खेलें";
    }

    // --- PROCEDURAL 2D CANVAS VECTOR GRAPHICS DRAWING FUNCTIONS ---
    function drawVectorGraphic(canvas, type) {
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();

        if (type === "running") {
            // Draw Running Stick Figure carrying 9 and 2
            ctx.strokeStyle = "#1e1e2f"; ctx.lineWidth = 4; ctx.lineCap = "round";
            // Head
            ctx.beginPath(); ctx.arc(40, 25, 8, 0, Math.PI*2); ctx.stroke();
            // Spine
            ctx.beginPath(); ctx.moveTo(40, 33); ctx.lineTo(45, 52); ctx.stroke();
            // Legs running pose
            ctx.beginPath(); ctx.moveTo(45, 52); ctx.lineTo(30, 68); ctx.moveTo(45, 52); ctx.lineTo(60, 65); ctx.stroke();
            // Arms
            ctx.beginPath(); ctx.moveTo(40, 38); ctx.lineTo(25, 45); ctx.moveTo(40, 38); ctx.lineTo(55, 42); ctx.stroke();
            // Text values 9, 2, 11 graphic elements around
            ctx.fillStyle = "#e11d48"; ctx.font = "bold 16px Arial"; ctx.fillText("9", 12, 30);
            ctx.fillStyle = "#2563eb"; ctx.font = "bold 16px Arial"; ctx.fillText("2", 62, 32);
            ctx.fillStyle = "#16a34a"; ctx.font = "bold 14px Arial"; ctx.fillText("=11", 45, 75);

        } else if (type === "starEye") {
            // Draw a cartoon eye tracking a star inside
            ctx.fillStyle = "#e2e8f0"; ctx.strokeStyle = "#1e1e2f"; ctx.lineWidth = 3;
            // White sclera casing
            ctx.beginPath(); ctx.ellipse(40, 40, 32, 20, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            // Blue Pupil circle
            ctx.fillStyle = "#3b82f6";
            ctx.beginPath(); ctx.arc(40, 40, 14, 0, Math.PI*2); ctx.fill();
            // Gold vector Star icon right in center of eye pupil
            drawStar(ctx, 40, 40, 5, 10, 4, "#f59e0b");

        } else if (type === "miceStomach") {
            // Outline generic human internal digestive pouch + little mouse inside
            ctx.fillStyle = "#fed7aa"; ctx.strokeStyle = "#9a3412"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.ellipse(40, 40, 28, 34, Math.PI/4, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            // Render basic grey mouse vectors nested inside outline boundary box
            ctx.fillStyle = "#6b7280";
            ctx.beginPath(); ctx.ellipse(42, 38, 14, 8, 0, 0, Math.PI*2); ctx.fill(); // body
            ctx.beginPath(); ctx.arc(52, 32, 5, 0, Math.PI*2); ctx.fill(); // ear
            ctx.strokeStyle = "#374151"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(28, 38); ctx.quadraticCurveTo(20, 42, 24, 48); ctx.stroke(); // tail

        } else if (type === "grabStars") {
            // Night background workspace boundary clip
            ctx.fillStyle = "#0f172a"; ctx.fillRect(4, 4, 72, 72);
            // Draw little gold stars
            drawStar(ctx, 20, 22, 5, 6, 2.5, "#fcc013");
            drawStar(ctx, 60, 26, 5, 7, 3, "#fcc013");
            drawStar(ctx, 42, 14, 5, 5, 2, "#fcc013");
            // Vector hand tracking upwards trying to reach stars
            ctx.strokeStyle = "#ffedd5"; ctx.fillStyle = "#fed7aa"; ctx.lineWidth = 4; ctx.lineJoin = "round";
            ctx.beginPath(); ctx.moveTo(32, 80); ctx.lineTo(34, 55); ctx.lineTo(44, 55); ctx.lineTo(46, 80); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.arc(39, 53, 5, 0, Math.PI, true); ctx.stroke();
        }
        ctx.restore();
    }

    // Mathematical utility handler to cleanly plot exact star vector vertex paths
    function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius, color) {
        let rot = Math.PI / 2 * 3;
        let x = cx;
        let y = cy;
        let step = Math.PI / spikes;

        ctx.beginPath();
        ctx.moveTo(cx, cy - outerRadius);
        for (let i = 0; i < spikes; i++) {
            x = cx + Math.cos(rot) * outerRadius;
            y = cy + Math.sin(rot) * outerRadius;
            ctx.lineTo(x, y);
            rot += step;

            x = cx + Math.cos(rot) * innerRadius;
            y = cy + Math.sin(rot) * innerRadius;
            ctx.lineTo(x, y);
            rot += step;
        }
        ctx.lineTo(cx, cy - outerRadius);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
    }
})();
</script>
</body>
</html>
